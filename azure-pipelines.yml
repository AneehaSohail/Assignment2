trigger:
  branches:
    include:
      - assignment2_model_training

pool:
  vmImage: ubuntu-latest

variables:
  AZURE_SUBSCRIPTION: SC-UDST-CCIT-DSAI3202-86c2aaee
  RESOURCE_GROUP: rg-60301575
  WORKSPACE_NAME: amazon-electronics-lab-60301575

steps:
  - checkout: self

  - task: AzureCLI@2
    displayName: "Submit Azure ML Training Job"
    inputs:
      azureSubscription: $(AZURE_SUBSCRIPTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -e

        echo "Ensuring Azure ML CLI extension is installed"
        az extension add -n ml -y || az extension update -n ml

        echo "Setting Azure ML defaults"
        az configure --defaults \
          group=$(RESOURCE_GROUP) \
          workspace=$(WORKSPACE_NAME)

        echo "Submitting Azure ML job"
        JOB_NAME=$(az ml job create --file jobs/train_job.yml --query name -o tsv)

        echo "Job name: $JOB_NAME"

        echo "Streaming job logs"
        az ml job stream --name $JOB_NAME